<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Random Quotes</title>
	<link rel="stylesheet" href="styles.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
		integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
		crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
	<div class="container">
		<h1>Random Quotes</h1>
		<div id="quote" class="quote">
			<p id="quote-text" class="quote">Click this button to get a random quote</p>
			<p id="quote-author">from popular authors</p>
			<button id="random-quote-btn" class="btn btn-primary">Choose random quote
				<i class="fas fa-random"></i>
			</button>
			<button id="random-quote-api-btn" class="btn btn-secondary">Generate quote via API
				<i class="fas fa-globe"></i>
			</button>
			<!-- <i id="quote-favorite-btn" class="fa-regular fa-star star-icon"></i> -->
		</div>
	</div>
	<!-- <div class="favorites-container" id="favorites-container">
		Fav quotes will be dynamically added here
	</div> -->
	<script type="module" src="index.js"></script>
</body>
</html>
